<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Complexa</title>
</head>
<body>
    <table border="1px">
        <caption>Produtos Produzidos por Loja</caption>
        <colgroup>
            <col>
            <col span="2" style="background-color: crimson;">
            <col span="2" style="background-color: cyan;">
        </colgroup>
        <thead>
            <tr>
                <th rowspan="2"></th>
                <th colspan="2" scope="colgroup">Vila Nova Conceição</th>
                <th colspan="2" scope="colgroup">Alphaville</th>
            </tr>
            <tr>
                <th scope="col">Produzidos</th>
                <th scope="col">Vendidos</th>
                <th scope="col">Produzidos</th>
                <th scope="col">Vendidos</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th scope="row">Produto 1</th>
                <td>25</td>
                <td>24</td>
                <td>30</td>
                <td>24</td>
            </tr>
            <tr>
                <th scope="row">Produto 2</th>
                <td>20</td>
                <td>20</td>
                <td>50</td>
                <td>50</td>
            </tr>
        </tbody>
        
    </table>
</body>
</html>
