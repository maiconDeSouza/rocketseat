<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password</title>
</head>
<body>
    <form action="">
        <!-- <input type="password" name="" id="" minlength="4" maxlength="10" size="8"> -->
        <input type="password" name="" id="" pattern="[0-9a-fA-f]{4,8}" title="Coloque Hex no ínimo 4 carcteres e no máximo 8 caracteres" inputmode="numeric">
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
